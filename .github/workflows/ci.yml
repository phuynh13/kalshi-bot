name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Bot: Python syntax + style checks ─────────────────────────────────────
  bot-checks:
    name: Bot (Python)
    runs-on: ubuntu-latest
    # Only run when bot/ files (or this workflow) change
    if: |
      github.event_name == 'push' ||
      contains(github.event.pull_request.changed_files, 'bot/') ||
      contains(github.event.pull_request.changed_files, '.github/workflows/')
    defaults:
      run:
        working-directory: bot
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: bot/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Syntax check (compile all .py files)
        run: python -m py_compile *.py

      - name: Lint with ruff
        run: ruff check .

  # ── Dashboard: TypeScript + Next.js build ─────────────────────────────────
  dashboard-checks:
    name: Dashboard (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (type check + production build)
        # Build needs env vars to run, but they don't need real values for
        # type checking. Provide stubs so the build doesn't fail at import time.
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://stub.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: stub
        run: npm run build
